<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <!-- Instant client-side redirect to your main domain -->
    <meta http-equiv="refresh" content="0; url=https://shimsys.com/">
    <script>
        // JS fallback redirect in case the browser ignores the meta tag
        window.location.replace("https://shimsys.com/");
    </script>
    <style>
        body {
            background-color: #FAFBFB;
            color: #1E2229;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .redirect-box {
            text-align: center;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #E2E8F0;
            border-top-color: #FF5A00;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="redirect-box">
        <div class="spinner"></div>
        <p>Redirecting to <a href="https://shimsys.com/" style="color: #FF5A00; text-decoration: none; font-weight: 600;">shimsys.com</a>...</p>
    </div>
</body>
</html>
